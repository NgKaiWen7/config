[colors]
background = #1e1e2e
background-alt = #313244
foreground = #cdd6f4
foreground-alt = #a6adc8

red = #f38ba8
blue = #89b4fa
green = #a6e3a1
yellow = #f9e2af

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 28
bottom = true
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
border-size = 0
padding-left = 1
padding-right = 1

module-margin-left = 1
module-margin-right = 1


font-0 = monospace:size=10;2
font-1 = Font Awesome:style=Solid:scale=10;2
font-2 = Noto Color Emoji:scale=7;2

modules-left = parrot i3
modules-center = title
modules-right = filesystem cpu memory date

cursor-click = pointer
cursor-scroll = ns-resize

tray-position = right
tray-padding = 2

wm-restack = i3
enable-ipc = true

[module/parrot]
type = custom/text
content = 🦜🐶🐈
content-font = 3
content-foreground = ${colors.green}
content-padding = 0

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = false

label-focused = %index%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.background}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 2

label-visible = %index%
label-visible-background = ${colors.background-alt}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2

[module/title]
type = internal/xwindow
label = %title%
label-maxlen = 70
label-empty = Debian i3
label-empty-foreground = ${colors.foreground-alt}

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /

label-mounted = 💾 %mountpoint% %percentage_used%%
label-mounted-foreground = ${colors.blue}

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.red}

[module/cpu]
type = internal/cpu
interval = 2

label = 🖥️ CPU %percentage%%
label-foreground = ${colors.red}

[module/memory]
type = internal/memory
interval = 2

label = 🧠 RAM %percentage_used%%
label-foreground = ${colors.blue}

[module/date]
type = internal/date
interval = 1

date = %a %d %b
time = %H:%M

label = 🗓️ %date%  ⏱️ %time%
label-foreground = ${colors.yellow}
